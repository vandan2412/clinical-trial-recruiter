version = 1
requires-python = ">=3.10"

[[package]]
name = "clinical-trial-recruiter"
version = "1.0.0"
source = { editable = "." }
dependencies = [
  { name = "pydantic" },
  { name = "openai" },
  { name = "numpy" },
  { name = "openenv-core" },
]

[package.metadata]
requires-dist = [
  { name = "pydantic", specifier = ">=2.0.0,<3.0.0" },
  { name = "openai", specifier = ">=1.0.0" },
  { name = "numpy", specifier = ">=1.24.0" },
  { name = "openenv-core", specifier = ">=0.2.0" },
]

[[package]]
name = "openenv-core"
version = "0.2.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openai"
version = "1.0.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pydantic"
version = "2.0.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "numpy"
version = "1.24.0"
source = { registry = "https://pypi.org/simple" }
